name: Generate Snake

on:
  # Her 12 saatte bir çalışır (eski 6 saat çok agresif, gereksiz minute harcıyor)
  schedule:
    - cron: "0 */12 * * *"

  # Manuel tetikleme
  workflow_dispatch:

  # main/master'a her push'ta da bir kez çalışsın
  push:
    branches:
      - main
      - master

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate snake animation files
        uses: Platane/snk@v3
        id: snake-gif
        with:
          # ÖNEMLİ: Burası senin kullanıcı adın olmalı, başkasının değil
          github_user_name: nby-code
          # Hem light hem dark tema için, hem svg hem gif üret
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif?color_snake=orange&color_dots=#bfd6f6,#8dbdff,#64a1f4,#4b91f1,#3c7dd9

      - name: Push generated files to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
